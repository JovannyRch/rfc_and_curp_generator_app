name: rfc_and_curp_helper
description: "Calculadora CURP y RFC - Mexican identity document calculator"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  flutter_riverpod: ^2.6.1
  go_router: ^17.2.2
  easy_localization: ^3.0.8
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.5.5
  google_mobile_ads: ^8.0.0
  in_app_purchase: ^3.2.3
  in_app_review: ^2.0.11
  share_plus: ^10.1.4
  uuid: ^4.5.3
  web: ^1.1.1

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/translations/
